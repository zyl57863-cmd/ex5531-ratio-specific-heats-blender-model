<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EX-5531 空气比热容比实验装置预览</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #16191d; color: #eef2f5; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    #app { display: grid; grid-template-columns: 1fr 300px; height: 100%; }
    #viewport { min-width: 0; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    aside { padding: 18px; background: #22272d; border-left: 1px solid #39414a; overflow: auto; }
    h1 { margin: 0 0 10px; font-size: 18px; line-height: 1.35; }
    p { color: #aeb8c2; font-size: 13px; line-height: 1.55; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0; }
    button { height: 34px; border: 1px solid #48525e; border-radius: 6px; color: #eef2f5; background: #313841; cursor: pointer; }
    button:hover { background: #3b4550; }
    .node { margin: 7px 0; padding: 8px; border: 1px solid #3b444d; border-radius: 6px; font: 12px/1.45 Consolas, monospace; background: #1b2025; }
    .ok { color: #72d572; } .bad { color: #ff8b8b; }
    @media (max-width: 820px) { #app { grid-template-columns: 1fr; grid-template-rows: 1fr 240px; } aside { border-left: 0; border-top: 1px solid #39414a; } }
  </style>
  <script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"}}
  </script>
</head>
<body>
  <div id="app">
    <main id="viewport"></main>
    <aside>
      <h1>EX-5531 / TD-8572A</h1>
      <p id="status">正在加载 GLB…</p>
      <div class="buttons">
        <button id="play">播放活塞</button>
        <button id="pause">暂停</button>
        <button id="reset">复位视角</button>
        <button id="wire">线框切换</button>
      </div>
      <div id="nodes"></div>
    </aside>
  </div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const viewport = document.querySelector('#viewport');
    const status = document.querySelector('#status');
    const nodePanel = document.querySelector('#nodes');
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    viewport.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x272b30);
    const camera = new THREE.PerspectiveCamera(38, 1, 0.002, 10);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    scene.add(new THREE.HemisphereLight(0xffffff, 0x28303a, 2.0));
    const key = new THREE.DirectionalLight(0xffffff, 2.6);
    key.position.set(-1, -1.5, 2.2);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xbfd7ff, 1.2);
    rim.position.set(1.2, 1, 1.4);
    scene.add(rim);

    const required = ['PistonAssembly_MOV','PistonLockKnob','VentPinchClamp','PressureSensor_ROOT','Hose_Main_Default','SensorPort_1','SensorPort_2','ANCHOR_Hose_Start','ANCHOR_Hose_End'];
    let model, mixer, action, wire = false;
    const clock = new THREE.Clock();

    function resize() {
      const w = viewport.clientWidth, h = viewport.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    addEventListener('resize', resize); resize();

    function frame(root) {
      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const span = Math.max(size.x, size.y, size.z);
      controls.target.copy(center).add(new THREE.Vector3(0, -0.02, 0.03));
      camera.position.set(center.x + span * 1.05, center.y - span * 1.45, center.z + span * 0.76);
      camera.near = 0.002; camera.far = 20; camera.updateProjectionMatrix();
      controls.update();
    }

    function showNodes(root) {
      nodePanel.innerHTML = required.map(name => {
        const object = root.getObjectByName(name);
        const state = object ? 'FOUND' : 'MISSING';
        const extra = object?.userData?.interaction ? ` · ${object.userData.interaction}` : '';
        return `<div class="node"><b>${name}</b><br><span class="${object ? 'ok' : 'bad'}">${state}${extra}</span></div>`;
      }).join('');
    }

    new GLTFLoader().load('../EX5531_TD8572A_ratio_specific_heats_final.glb', gltf => {
      model = gltf.scene;
      model.traverse(object => {
        if (object.name.startsWith('COL_') || object.userData.collider) object.visible = false;
      });
      scene.add(model);
      frame(model);
      showNodes(model);
      if (gltf.animations.length) {
        mixer = new THREE.AnimationMixer(model);
        action = mixer.clipAction(gltf.animations[0]);
        action.play();
      }
      const found = required.filter(name => model.getObjectByName(name)).length;
      status.textContent = `加载完成：${found}/${required.length} 个关键节点，动画 ${gltf.animations.length} 条。鼠标左键旋转，滚轮缩放。`;
    }, undefined, error => status.textContent = `加载失败：${error.message}`);

    document.querySelector('#play').onclick = () => action?.play();
    document.querySelector('#pause').onclick = () => action?.stop();
    document.querySelector('#reset').onclick = () => model && frame(model);
    document.querySelector('#wire').onclick = () => {
      wire = !wire;
      model?.traverse(object => {
        if (!object.isMesh) return;
        const materials = Array.isArray(object.material) ? object.material : [object.material];
        materials.forEach(material => material.wireframe = wire);
      });
    };

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      mixer?.update(clock.getDelta());
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
